<!-- PIXEL-CLOSE VERSION BASED ON YOUR SCREEN --><!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<style>
body{margin:0;font-family:Poppins;background:#f2f2f2}
.app{max-width:390px;margin:auto;background:#fff;height:100vh;display:flex;flex-direction:column}.header{background:#2e7d32;color:#fff;padding:12px;text-align:center;font-weight:600}

.banner{ height:150px; background:#ccc; /* replace with your screenshot image */ }

.green-strip{ background:#2e7d32; color:#fff; display:flex; justify-content:space-around; padding:10px 0; font-size:12px; }

.section{padding:12px} .title{font-weight:600;margin-bottom:10px}

.row{display:flex;gap:10px;overflow-x:auto} .card{min-width:110px;background:#fff;border-radius:12px;box-shadow:0 2px 6px rgba(0,0,0,0.1);padding:8px} .card img{width:100%;border-radius:10px} .btn{background:#2e7d32;color:#fff;border:none;padding:6px;border-radius:6px;width:100%}

.plan{background:#fff;border-radius:12px;padding:12px;margin-bottom:10px;box-shadow:0 2px 6px rgba(0,0,0,0.1)}

.footer{display:flex;justify-content:space-around;padding:10px;border-top:1px solid #ddd} .footer button{background:none;border:none;color:#2e7d32}

.page{display:none;flex:1;overflow:auto} .active{display:block} </style>

</head><body>
<div class="app"><!-- HOME --><div id="home" class="page active">
  <div class="header">Farm2Home</div>
  <div class="banner"></div>  <div class="green-strip">
    <div>Subscription</div>
    <div>Orders</div>
    <div>Story</div>
  </div>  <div class="section">
    <div class="title">Quick Order</div>
    <div class="row">
      <div class="card">
        <img src="https://via.placeholder.com/100">
        <button class="btn">Add</button>
      </div>
      <div class="card">
        <img src="https://via.placeholder.com/100">
        <button class="btn">Add</button>
      </div>
    </div>
  </div>
</div><!-- SUBSCRIPTION --><div id="subscription" class="page">
  <div class="header">Choose Your Plan</div>
  <div class="section">
    <div class="plan">Family Plan</div>
    <div class="plan">Couple Plan</div>
    <div class="plan">Customize Plan</div>
    <div class="plan">Reviews ⭐⭐⭐⭐</div>
  </div>
</div><!-- ORDERS --><div id="orders" class="page">
  <div class="header">My Orders</div>
  <div class="section">
    <div class="plan">Order layout like your image</div>
  </div>
</div><!-- STORY --><div id="story" class="page">
  <div class="header">Our Story</div>
  <div class="section">
    <div class="plan">
      Our Story content here<br>
      Helpdesk<br>
      Tradition & Associates
    </div>
  </div>
</div><div class="footer">
  <button onclick="show('home')">Home</button>
  <button onclick="show('subscription')">Subscription</button>
  <button onclick="show('orders')">Orders</button>
  <button onclick="show('story')">Story</button>
</div></div><script>
function show(p){document.querySelectorAll('.page').forEach(e=>e.classList.remove('active'));document.getElementById(p).classList.add('active');}
</script></body>
</html><!-- IMPORTANT:
To make it EXACT like your screenshot:
1. Replace banner with cropped screenshot image
2. Replace product images with cropped images from your pic
3. Adjust spacing slightly if needed
-->
